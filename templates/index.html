<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Industrial Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Alerts -->
  <div id="alerts-container"></div>

  <!-- Dashboard -->
  <div class="dashboard">

    <div class="card">
      <h2>System Status</h2>
      <div id="system-status" class="metric green">Online</div>
      <div id="last-updated">Last Updated: --:--:--</div>
    </div>

    <div class="card">
      <h2>Temperature</h2>
      <div id="temperature" class="metric green">-- °C</div>
    </div>

    <div class="card">
      <h2>Humidity</h2>
      <div id="humidity" class="metric green">-- %</div>
    </div>

    <div class="card">
      <h2>Distance (HC-SR04)</h2>
      <div id="distance" class="metric green">-- cm</div>
    </div>

    <div class="card">
      <h2>Smoke / MQ-2</h2>
      <div id="smoke" class="metric green">-- </div>
    </div>

    <div class="card">
      <h2>Joystick</h2>
      <div id="joystick" class="metric green">X: -- / Y: --</div>
    </div>

    <div class="card">
      <h2>Buzzer</h2>
      <div id="buzzer-status" class="metric green">OFF</div>
    </div>

    <div class="card">
      <h2>LED</h2>
      <div id="led-status" class="metric green">OFF</div>
    </div>

  </div>

  <!-- Chatbot Button -->
  <button id="chatbot-btn">💬</button>

  <!-- Chat Panel -->
  <div id="chat-panel">
    <div id="chat-header">Industrial Bot</div>
    <div id="chat-messages">
      <div class="message bot-msg">Hello! I am your industrial assistant.</div>
    </div>
    <div id="chat-input">
      <input type="text" id="user-input" placeholder="Type message...">
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
